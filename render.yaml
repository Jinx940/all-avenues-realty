services:
  - type: web
    name: all-avenues-realty
    runtime: node
    buildCommand: npm install && npm run build:deploy
    preDeployCommand: npm run prisma:migrate:deploy --prefix backend
    startCommand: npm run start --prefix backend
    healthCheckPath: /api/health
    autoDeploy: true
    disk:
      name: uploads
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: TRUST_PROXY
        value: "true"
      - key: DATABASE_URL
        fromDatabase:
          name: all-avenues-realty-db
          property: connectionString
      - key: SESSION_COOKIE_NAME
        value: all_avenues_session
      - key: AUTH_SESSION_DAYS
        value: "14"
      - key: UPLOADS_DIR
        value: /var/data/uploads
      - key: MAX_UPLOAD_SIZE_MB
        value: "10"

databases:
  - name: all-avenues-realty-db
    databaseName: all_avenues_realty
    user: all_avenues_realty
